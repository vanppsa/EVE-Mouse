<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>EVE Mouse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0a0a0f;
--surface:#12121a;
--surface2:#181822;
--border:#1e1e2e;
--text:#e0e0e8;
--muted:#6b6b80;
--accent:#3b82f6;
--accent-dim:#3b82f622;
--danger:#ff4466;
--radius:10px;
}
html,body{
height:100%;width:100%;overflow:hidden;
background:var(--bg);color:var(--text);
font-family:'DM Sans',system-ui,sans-serif;
touch-action:none;
}
body{
display:flex;flex-direction:column;
background-image:
radial-gradient(ellipse at 50% 0%,#3b82f606 0%,transparent 50%);
}

.top-bar{
flex-shrink:0;
display:flex;align-items:center;gap:8px;
padding:8px 12px;
background:var(--surface);
border-bottom:1px solid var(--border);
}
.status-dot{
width:8px;height:8px;border-radius:50%;
background:var(--accent);
flex-shrink:0;
animation:pulse 2s infinite;
}
.status-dot.off{background:var(--danger);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.top-bar .label{
font-family:'Space Mono',monospace;
font-size:.7rem;color:var(--muted);
letter-spacing:1px;white-space:nowrap;
}
.text-input-wrap{
flex:1;min-width:0;
}
.text-input-wrap input{
width:100%;padding:8px 12px;
background:var(--surface2);
border:1px solid var(--border);
border-radius:8px;
color:var(--text);font-size:.85rem;
font-family:inherit;outline:none;
transition:border-color .2s,box-shadow .2s;
}
.text-input-wrap input:focus{
border-color:var(--accent);
box-shadow:0 0 0 2px var(--accent-dim);
}
.text-input-wrap input::placeholder{color:var(--muted)}
.btn-logout{
flex-shrink:0;
background:none;border:1px solid var(--border);
border-radius:8px;padding:6px 10px;
color:var(--muted);font-size:.7rem;
font-family:'Space Mono',monospace;
cursor:pointer;transition:all .2s;
letter-spacing:.5px;
}
.btn-logout:active{border-color:var(--danger);color:var(--danger)}

.trackpad-area{
flex:1;position:relative;
margin:8px;
border-radius:var(--radius);
background:
radial-gradient(circle at 50% 50%,#ffffff02 0%,transparent 70%),
var(--surface);
border:1px solid var(--border);
overflow:hidden;
user-select:none;
-webkit-user-select:none;
}
.trackpad-area::after{
content:'';position:absolute;inset:0;
border-radius:inherit;
background:radial-gradient(circle at var(--tx,50%) var(--ty,50%),#3b82f608 0%,transparent 40%);
pointer-events:none;
transition:background .3s;
}
.trackpad-hint{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
text-align:center;pointer-events:none;
opacity:.15;transition:opacity .5s;
}
.trackpad-hint.hidden{opacity:0}
.trackpad-hint svg{
width:32px;height:32px;stroke:var(--muted);margin:0 auto 8px;
}
.trackpad-hint span{
font-size:.7rem;color:var(--muted);
font-family:'Space Mono',monospace;
letter-spacing:1px;
}
.two-finger-hint{
position:absolute;bottom:12px;left:50%;
transform:translateX(-50%);
font-size:.6rem;color:var(--muted);
opacity:0;transition:opacity .3s;
pointer-events:none;
font-family:'Space Mono',monospace;
letter-spacing:.5px;
}
.two-finger-hint.show{opacity:.3}

.special-keys{
flex-shrink:0;
display:flex;gap:6px;
padding:6px 12px;
overflow-x:auto;
-webkit-overflow-scrolling:touch;
}
.special-keys::-webkit-scrollbar{display:none}
.key-btn{
flex-shrink:0;
padding:8px 14px;
background:var(--surface);
border:1px solid var(--border);
border-radius:8px;
color:var(--text);
font-size:.72rem;font-family:'Space Mono',monospace;
cursor:pointer;
transition:all .1s;
letter-spacing:.3px;
}
.key-btn:active{
background:var(--accent);
color:var(--bg);
border-color:var(--accent);
transform:scale(.95);
}
.media-btn{
padding:8px 12px;
background:var(--surface2);
border:1px solid var(--accent);
color:var(--accent);
}
.media-btn.active{
background:var(--accent);
color:var(--bg);
}
.media-btn svg{
width:18px;height:18px;
display:block;
}

.media-overlay{
position:fixed;inset:0;
background:rgba(0,0,0,.6);
opacity:0;visibility:hidden;
transition:opacity .3s,visibility .3s;
z-index:100;
}
.media-overlay.show{
opacity:1;visibility:visible;
}

.media-menu{
position:fixed;
bottom:0;left:0;right:0;
background:var(--surface);
border-top:1px solid var(--border);
border-radius:20px 20px 0 0;
padding:16px 20px 24px;
padding-bottom:max(24px,env(safe-area-inset-bottom));
transform:translateY(100%);
transition:transform .3s ease-out;
z-index:101;
}
.media-overlay.show .media-menu{
transform:translateY(0);
}

.media-header{
display:flex;align-items:center;justify-content:space-between;
margin-bottom:20px;
}
.media-header span{
font-family:'Space Mono',monospace;
font-size:.8rem;color:var(--muted);
letter-spacing:1px;
}
.media-close{
width:32px;height:32px;
display:flex;align-items:center;justify-content:center;
background:var(--surface2);
border:1px solid var(--border);
border-radius:50%;
color:var(--muted);
font-size:1.2rem;
cursor:pointer;
}
.media-close:active{
background:var(--danger);
border-color:var(--danger);
color:var(--bg);
}

.media-dpad{
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
gap:8px;
max-width:240px;
margin:0 auto 24px;
}
.dpad-btn{
aspect-ratio:1;
background:var(--surface2);
border:1px solid var(--border);
border-radius:12px;
display:flex;align-items:center;justify-content:center;
font-size:1.5rem;
color:var(--text);
cursor:pointer;
transition:all .1s;
}
.dpad-btn:active{
background:var(--accent);
border-color:var(--accent);
transform:scale(.95);
}
.dpad-btn.up{grid-column:2;grid-row:1}
.dpad-btn.left{grid-column:1;grid-row:2}
.dpad-btn.center{grid-column:2;grid-row:2;background:transparent;border:none;cursor:default}
.dpad-btn.center:active{transform:none}
.dpad-btn.right{grid-column:3;grid-row:2}
.dpad-btn.down{grid-column:2;grid-row:3}

.media-controls{
display:flex;justify-content:center;gap:12px;
flex-wrap:wrap;
}
.ctrl-btn{
width:52px;height:52px;
background:var(--surface2);
border:1px solid var(--border);
border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:1.1rem;
color:var(--text);
cursor:pointer;
transition:all .1s;
}
.ctrl-btn:active{
background:var(--accent);
border-color:var(--accent);
transform:scale(.95);
}
.ctrl-btn.play{width:64px;height:64px;font-size:1.4rem;background:var(--accent);border-color:var(--accent);color:var(--bg)}

.bottom-buttons{
flex-shrink:0;
display:flex;gap:8px;
padding:8px 12px 16px;
padding-bottom:max(16px,env(safe-area-inset-bottom));
}
.btn-click{
flex:1;
display:flex;align-items:center;justify-content:center;gap:8px;
padding:18px;
border:1.5px solid var(--border);
border-radius:var(--radius);
background:var(--surface);
font-family:'Space Mono',monospace;
font-size:.85rem;font-weight:700;
color:var(--text);
cursor:pointer;
transition:all .1s;
letter-spacing:1px;
}
.btn-click:active{
background:var(--accent);
color:var(--bg);
border-color:var(--accent);
transform:scale(.97);
}
.btn-click svg{width:20px;height:20px}
.btn-click.right{
border-color:#ff446633;
}
.btn-click.right:active{
background:var(--danger);
border-color:var(--danger);
}
</style>
</head>
<body>

<div class="top-bar">
<div class="status-dot" id="statusDot"></div>
<span class="label">EVE MOUSE</span>
<div class="text-input-wrap">
<input type="text" id="textInput" placeholder="Type here..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
</div>
<button class="btn-logout" id="btnLogout">EXIT</button>
</div>

<div class="trackpad-area" id="trackpad">
<div class="trackpad-hint" id="trackpadHint">
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" d="M15.042 21.672 13.684 16.6m0 0-2.51 2.225.569-9.47 5.227 7.917-3.286-.672ZM12 2.25V4.5m5.834.166-1.591 1.591M20.25 10.5H18M7.757 14.743l-1.59 1.59M6 10.5H3.75m4.007-4.243-1.59-1.59"/>
</svg>
<span>TOUCH AND DRAG</span>
</div>
<div class="two-finger-hint" id="twoFingerHint">2 FINGERS = RIGHT CLICK / SCROLL</div>
</div>

<div class="special-keys" id="specialKeys">
<button class="key-btn media-btn" id="btnMedia">
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" d="M8.25 3v1.5M4.5 8.25H3m18 0h-1.5M4.5 12H3m18 0h-1.5m-15 3.75H3m18 0h-1.5M8.25 19.5V21M12 3v1.5m0 15V21m3.75-18v1.5m0 15V21m-9-1.5h10.5a2.25 2.25 0 0 0 2.25-2.25V6.75a2.25 2.25 0 0 0-2.25-2.25H6.75A2.25 2.25 0 0 0 4.5 6.75v10.5a2.25 2.25 0 0 0 2.25 2.25Zm.75-12h9v9h-9v-9Z"/>
</svg>
</button>
<button class="key-btn" data-key="enter">ENTER</button>
<button class="key-btn" data-key="backspace">DEL</button>
<button class="key-btn" data-key="tab">TAB</button>
<button class="key-btn" data-key="esc">ESC</button>
<button class="key-btn" data-key="space">SPACE</button>
<button class="key-btn" data-key="up">&#9650;</button>
<button class="key-btn" data-key="down">&#9660;</button>
<button class="key-btn" data-key="left">&#9664;</button>
<button class="key-btn" data-key="right">&#9654;</button>
<button class="key-btn" data-key="ctrl">CTRL</button>
<button class="key-btn" data-key="alt">ALT</button>
<button class="key-btn" data-key="super">SUPER</button>
</div>

<div class="media-overlay" id="mediaOverlay">
<div class="media-menu">
<div class="media-header">
<span>MEDIA CONTROL</span>
<button class="media-close" id="mediaClose">&times;</button>
</div>
<div class="media-dpad">
<div class="dpad-btn up" data-key="up">&#9650;</div>
<div class="dpad-btn left" data-key="left">&#9664;</div>
<div class="dpad-btn center"></div>
<div class="dpad-btn right" data-key="right">&#9654;</div>
<div class="dpad-btn down" data-key="down">&#9660;</div>
</div>
<div class="media-controls">
<button class="ctrl-btn" data-key="prev">&#9198;</button>
<button class="ctrl-btn" data-key="rewind">&#9194;</button>
<button class="ctrl-btn play" data-key="playpause">&#9654;&#10073;&#10073;</button>
<button class="ctrl-btn" data-key="forward">&#9193;</button>
<button class="ctrl-btn" data-key="next">&#9197;</button>
</div>
<div class="media-controls" style="margin-top:12px">
<button class="ctrl-btn" data-key="mute">&#128263;</button>
<button class="ctrl-btn" data-key="voldn">&#8722;</button>
<button class="ctrl-btn" data-key="volup">&#43;</button>
<button class="ctrl-btn" data-key="stop">&#9632;</button>
</div>
</div>
</div>

<div class="bottom-buttons">
<button class="btn-click left" id="btnLeft">
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
</svg>
L
</button>
<button class="btn-click right" id="btnRight">
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
</svg>
R
</button>
</div>

<script>
const wsUrl = `ws://${location.host}/ws`;
let ws = null;
let lastTouch = null;
let touchOrigin = null;
let isDragging = false;
let lastTapTime = 0;
let pendingDrag = false;
let twoFingerMoved = false;
let twoFingerStart = false;
let sensitivity = 1.5;
let hintHidden = false;
let prevInputText = '';

function connect() {
    ws = new WebSocket(wsUrl);
    ws.addEventListener('open', () => {
        document.getElementById('statusDot').classList.remove('off');
    });
    ws.addEventListener('close', () => {
        document.getElementById('statusDot').classList.add('off');
        setTimeout(connect, 2000);
    });
    ws.addEventListener('error', () => {});
}

function send(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(obj));
    }
}

connect();

const trackpad = document.getElementById('trackpad');
const trackpadHint = document.getElementById('trackpadHint');
const twoFingerHint = document.getElementById('twoFingerHint');
const mediaOverlay = document.getElementById('mediaOverlay');
const btnMedia = document.getElementById('btnMedia');
const mediaClose = document.getElementById('mediaClose');
const mediaDpad = document.querySelector('.media-dpad');
const mediaControls = document.querySelectorAll('.media-controls .ctrl-btn');

btnMedia.addEventListener('click', () => {
    mediaOverlay.classList.add('show');
    btnMedia.classList.add('active');
});

mediaClose.addEventListener('click', () => {
    mediaOverlay.classList.remove('show');
    btnMedia.classList.remove('active');
});

mediaOverlay.addEventListener('click', (e) => {
    if (e.target === mediaOverlay) {
        mediaOverlay.classList.remove('show');
        btnMedia.classList.remove('active');
    }
});

mediaDpad.querySelectorAll('.dpad-btn[data-key]').forEach(btn => {
    btn.addEventListener('click', () => {
        send({ type: 'media_key', key: btn.dataset.key });
    });
});

mediaControls.forEach(btn => {
    btn.addEventListener('click', () => {
        send({ type: 'media_key', key: btn.dataset.key });
    });
});

trackpad.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (!hintHidden) {
        trackpadHint.classList.add('hidden');
        hintHidden = true;
    }
    if (e.touches.length === 2) {
        twoFingerMoved = false;
        twoFingerStart = true;
        const t0 = e.touches[0];
        const t1 = e.touches[1];
        touchOrigin = {
            x: (t0.clientX + t1.clientX) / 2,
            y: (t0.clientY + t1.clientY) / 2
        };
        lastTouch = { x: touchOrigin.x, y: touchOrigin.y };
        twoFingerHint.classList.add('show');
        return;
    }
    twoFingerStart = false;
    if (e.touches.length === 1) {
        const now = Date.now();
        const isRapidSecondTap = (now - lastTapTime < 400);
        touchOrigin = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        isDragging = false;
        if (isRapidSecondTap) {
            send({ type: 'mousedown', button: 'left' });
            isDragging = true;
        }
    }
}, { passive: false });

trackpad.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 2) {
        twoFingerMoved = true;
        const t0 = e.touches[0];
        const t1 = e.touches[1];
        const currentX = (t0.clientX + t1.clientX) / 2;
        const currentY = (t0.clientY + t1.clientY) / 2;
        const dx = (currentX - lastTouch.x) * sensitivity;
        const dy = (currentY - lastTouch.y) * sensitivity;
        if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
            send({ type: 'scroll', dy: dy > 0 ? -1 : 1 });
        }
        lastTouch = { x: currentX, y: currentY };
        return;
    }
    if (e.touches.length === 1 && lastTouch) {
        const dx = (e.touches[0].clientX - lastTouch.x) * sensitivity;
        const dy = (e.touches[0].clientY - lastTouch.y) * sensitivity;
        if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
            isDragging = true;
            send({ type: 'mousemove', dx, dy });
            const rect = trackpad.getBoundingClientRect();
            const tx = ((e.touches[0].clientX - rect.left) / rect.width) * 100;
            const ty = ((e.touches[0].clientY - rect.top) / rect.height) * 100;
            trackpad.style.setProperty('--tx', tx + '%');
            trackpad.style.setProperty('--ty', ty + '%');
        }
    }
    lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: false });

trackpad.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (e.touches.length === 0) {
        twoFingerHint.classList.remove('show');
        if (isDragging) {
            send({ type: 'mouseup', button: 'left' });
            isDragging = false;
        } else if (twoFingerStart && !twoFingerMoved) {
            send({ type: 'click', button: 'right' });
        } else if (lastTouch && touchOrigin) {
            const dist = Math.abs(lastTouch.x - touchOrigin.x) + Math.abs(lastTouch.y - touchOrigin.y);
            if (dist < 10) {
                lastTapTime = Date.now();
                send({ type: 'click', button: 'left' });
            }
        }
twoFingerStart = false;
      twoFingerMoved = false;
      touchOrigin = null;
        lastTouch = null;
    } else if (e.touches.length === 1) {
        if (isDragging) {
            send({ type: 'mouseup', button: 'left' });
            isDragging = false;
        }
        touchOrigin = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    } else if (e.touches.length === 2) {
        if (!twoFingerMoved) {
            send({ type: 'click', button: 'right' });
        }
        const t0 = e.touches[0];
        const t1 = e.touches[1];
        touchOrigin = { x: (t0.clientX + t1.clientX) / 2, y: (t0.clientY + t1.clientY) / 2 };
        lastTouch = { x: touchOrigin.x, y: touchOrigin.y };
    }
}, { passive: false });

document.getElementById('btnLeft').addEventListener('touchstart', (e) => {
    e.preventDefault();
    send({ type: 'click', button: 'left' });
}, { passive: false });

document.getElementById('btnRight').addEventListener('touchstart', (e) => {
    e.preventDefault();
    send({ type: 'click', button: 'right' });
}, { passive: false });

const textInput = document.getElementById('textInput');
let imeActive = false;

textInput.addEventListener('compositionstart', () => {
    imeActive = true;
});

textInput.addEventListener('compositionend', (e) => {
    imeActive = false;
    const newVal = textInput.value;
    if (newVal.length > prevInputText.length) {
        const diff = newVal.slice(prevInputText.length);
        if (diff) send({ type: 'keydown', text: diff });
    } else if (newVal.length < prevInputText.length) {
        const count = prevInputText.length - newVal.length;
        for (let i = 0; i < count; i++) send({ type: 'special_key', key: 'backspace' });
    }
    prevInputText = newVal;
});

textInput.addEventListener('input', (e) => {
    if (imeActive) return;
    const cur = textInput.value;
    const prev = prevInputText;

    if (cur.length > prev.length) {
        const diff = cur.slice(prev.length);
        if (diff) send({ type: 'keydown', text: diff });
    } else if (cur.length < prev.length) {
        const count = prev.length - cur.length;
        for (let i = 0; i < count; i++) send({ type: 'special_key', key: 'backspace' });
    } else if (cur !== prev && cur.length > 0) {
        if (cur.length === prev.length) send({ type: 'special_key', key: 'backspace' });
        if (cur) send({ type: 'keydown', text: cur });
    }
    prevInputText = cur;
});

textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !imeActive) {
        e.preventDefault();
        send({ type: 'special_key', key: 'enter' });
        textInput.value = '';
        prevInputText = '';
    }
});

document.getElementById('specialKeys').addEventListener('click', (e) => {
    const btn = e.target.closest('.key-btn');
    if (!btn || btn.id === 'btnMedia') return;
    const key = btn.dataset.key;
    if (key) send({ type: 'special_key', key });
});

document.getElementById('btnLogout').addEventListener('click', () => {
    window.location.href = '/auth/logout';
});

textInput.addEventListener('blur', () => {
    setTimeout(() => textInput.focus(), 100);
});
textInput.focus();
</script>
</body>
</html>
